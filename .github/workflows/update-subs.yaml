name: 自动更新订阅
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v6

      - name: 下载订阅源
        run: |
          curl -sL --max-time 30 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt" -o /tmp/s1.txt
          curl -sL --max-time 30 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS.txt" -o /tmp/s2.txt
          curl -sL --max-time 30 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/WHITE-CIDR-RU-all.txt" -o /tmp/s3.txt
          curl -sL --max-time 30 "https://x.v50.lat/view.php?id=1570ebe7f5bb04ba" -o /tmp/s4.txt
          curl -sL --max-time 30 "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub" | base64 -d > /tmp/s5.txt 2>/dev/null
          echo "s1=$(wc -l < /tmp/s1.txt) s2=$(wc -l < /tmp/s2.txt) s3=$(wc -l < /tmp/s3.txt) s4=$(wc -l < /tmp/s4.txt) s5=$(wc -l < /tmp/s5.txt)"

      - name: 合并+清洗+测速+选全部可用节点
        run: ruby scripts/update_subs.rb

      - name: 校验 YAML（语法检查）
        run: |
          ruby -ryaml -e "YAML.load_file('/tmp/dali_config.yaml'); puts 'YAML 语法 OK'" || (echo "YAML 语法错误！"; exit 1)
          echo "--- 前 30 行预览 ---"
          head -30 /tmp/dali_config.yaml

      - name: 提交到仓库
        run: |
          cp /tmp/dali_config.yaml assets/data/dali_config.yaml
          git config user.name "大力VPN Bot"
          git config user.email "bot@dalivpn.com"
          git add assets/data/dali_config.yaml
          git diff --cached --quiet || git commit -m "🔄 自动更新 $(date +%Y-%m-%d)（全部可用节点）"
          git push
