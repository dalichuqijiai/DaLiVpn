name: 自动更新订阅
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v6

      - name: 下载订阅源
        run: |
          curl -sL --max-time 30 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt" -o /tmp/s1.txt
          curl -sL --max-time 30 "https://x.v50.lat/view.php?id=1570ebe7f5bb04ba" -o /tmp/s2.txt
          curl -sL --max-time 30 "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub" | base64 -d > /tmp/s3.txt 2>/dev/null
          echo "s1=$(wc -l < /tmp/s1.txt) s2=$(wc -l < /tmp/s2.txt) s3=$(wc -l < /tmp/s3.txt)"

      - name: 合并+清洗+测速+选30个
        run: |
          ruby -e '
            require "yaml"
            require "socket"
            require "timeout"
            require "cgi"
            require "base64"
            require "resolv"

            # === 1. 读 3 个订阅源 ===
            sources = ["/tmp/s1.txt","/tmp/s2.txt","/tmp/s3.txt"]
            raw_lines = []
            sources.each do |f|
              next unless File.exist?(f)
              data = File.read(f).strip
              # 如果整文件是 base64，先解码
              if data.length > 50 && data !~ /\n/ && data =~ /\A[A-Za-z0-9+\/=\-_]+\z/
                begin
                  decoded = Base64.decode64(data.tr("-_","+/"))
                  if decoded =~ /vless:\/\// || decoded =~ /trojan:\/\// || decoded =~ /vmess:\/\// || decoded =~ /ss:\/\//
                    data = decoded
                  end
                rescue; end
              end
              data.each_line do |ln|
                ln = ln.strip
                next if ln.empty?
                # 可能是 yaml 节点（sub2 是 clash 格式）
                if ln =~ /^vless:\/\// || ln =~ /^trojan:\/\// || ln =~ /^vmess:\/\// || ln =~ /^ss:\/\//
                  raw_lines << ln
                end
              end
            end
            puts "原始链接数: #{raw_lines.length}"

            # === 2. 解析每条链接 ===
            # 参考 siiway/urlclash-converter 的转换规则
            VALID_FP = %w[chrome firefox safari edge ios qq android random none].freeze
            def clean_fp(v); v && VALID_FP.include?(v.downcase) ? v.downcase : "chrome"; end

            def parse_params(qs)
              h = {}
              qs.to_s.split("&").each do |kv|
                k, v = kv.split("=", 2)
                next unless k
                h[k.downcase] = v ? CGI.unescape(v) : ""
              end
              h
            end

            proxies = []
            seen = {}

            raw_lines.each_with_index do |line, idx|
              begin
                px = nil
                if line =~ /^vless:\/\//
                  body = line.sub(/^vless:\/\//, "")
                  # vless://uuid@host:port?params#name
                  m = body.match(/\A(.+?)@(\[[^\]]+\]|[^:?\/]+):(\d+)\/?(\?(.+?))?(?:#(.*))?\z/)
                  next unless m
                  uuid = CGI.unescape(m[1])
                  host = m[2].gsub(/^\[|\]$/, "")
                  port = m[3].to_i
                  params = parse_params(m[5])
                  raw_name = m[6] ? CGI.unescape(m[6]) : nil
                  name = (raw_name && raw_name.strip) || "VLESS-#{host}:#{port}"

                  security = params["security"].to_s.downcase
                  net = params["type"].to_s.downcase
                  net = "tcp" if net.empty?

                  # 跳过不支持的 network
                  next unless %w[tcp ws http grpc h2].include?(net)

                  px = {"name" => name, "type" => "vless", "server" => host, "port" => port, "uuid" => uuid}

                  if security == "reality"
                    pbk = params["pbk"].to_s
                    sid = params["sid"].to_s
                    # 严格校验：pbk 必须是 43 字符的 urlsafe-base64，sid 必须是偶数位 hex（≤16字符）
                    next unless pbk.length == 43 && pbk =~ /\A[A-Za-z0-9+\/\-_]+\z/
                    next if !sid.empty? && !(sid.length <= 16 && sid =~ /\A[0-9a-fA-F]+\z/)
                    px["tls"] = true
                    px["servername"] = params["sni"] || params["peer"] if params["sni"] || params["peer"]
                    px["flow"] = "xtls-rprx-vision" if params["flow"] && params["flow"].to_s.include?("vision")
                    px["client-fingerprint"] = clean_fp(params["fp"])
                    ro = {"public-key" => pbk}
                    ro["short-id"] = sid unless sid.empty?
                    px["reality-opts"] = ro
                  elsif security == "tls" || security == ""
                    px["tls"] = true
                    px["servername"] = params["sni"] || params["peer"] || params["host"] if params["sni"] || params["peer"] || params["host"]
                    px["flow"] = "xtls-rprx-vision" if params["flow"] && params["flow"].to_s.include?("vision")
                    px["client-fingerprint"] = clean_fp(params["fp"]) if params["fp"]
                  else
                    # 其它 security（xtls 等）跳过
                    next
                  end

                  if net != "tcp"
                    px["network"] = net
                    opts = {}
                    host_h = params["host"] || params["obfsparam"]
                    if host_h
                      opts["headers"] = {"Host" => host_h}
                    end
                    opts["path"] = params["path"] if params["path"] && !params["path"].empty?
                    if net == "grpc"
                      opts = {}
                      opts["grpc-service-name"] = params["serviceName"] if params["serviceName"]
                    end
                    px["#{net}-opts"] = opts unless opts.empty?
                  end

                elsif line =~ /^trojan:\/\//
                  body = line.sub(/^trojan:\/\//, "")
                  m = body.match(/\A(.+?)@(\[[^\]]+\]|[^:?\/]+):(\d+)\/?(\?(.+?))?(?:#(.*))?\z/)
                  next unless m
                  pw = CGI.unescape(m[1])
                  host = m[2].gsub(/^\[|\]$/, "")
                  port = m[3].to_i
                  params = parse_params(m[5])
                  raw_name = m[6] ? CGI.unescape(m[6]) : nil
                  name = (raw_name && raw_name.strip) || "Trojan-#{host}:#{port}"
                  px = {"name" => name, "type" => "trojan", "server" => host, "port" => port, "password" => pw, "tls" => true, "sni" => nil}
                  px["servername"] = params["sni"] || params["peer"] || host if params["sni"] || params["peer"]
                  px["skip-cert-verify"] = true if params["allowInsecure"] == "1"

                elsif line =~ /^vmess:\/\//
                  body = line.sub(/^vmess:\/\//, "")
                  begin
                    json = JSON.parse(Base64.decode64(body.tr("-_","+/")))
                  rescue; next; end
                  host = json["add"].to_s
                  port = json["port"].to_i
                  next if host.empty? || port == 0
                  name = json["ps"].to_s.empty? ? "VMess-#{host}:#{port}" : json["ps"].to_s
                  px = {"name" => name, "type" => "vmess", "server" => host, "port" => port, "uuid" => json["id"], "alterId" => (json["aid"] || 0).to_i, "cipher" => json["scy"] || "auto"}
                  net = (json["net"] || "tcp").to_s.downcase
                  net = "tcp" unless %w[tcp ws http grpc h2].include?(net)
                  px["network"] = net
                  px["tls"] = (json["tls"] == "tls")
                  px["servername"] = json["sni"] if json["sni"] && !json["sni"].empty?
                  px["client-fingerprint"] = clean_fp(json["fp"]) if json["fp"]
                  if net == "ws"
                    opts = {}
                    opts["headers"] = {"Host" => json["host"]} if json["host"] && !json["host"].to_s.empty?
                    opts["path"] = json["path"] || "/"
                    px["ws-opts"] = opts unless opts.empty?
                  end

                elsif line =~ /^ss:\/\//
                  body = line.sub(/^ss:\/\//, "")
                  m = body.match(/\A(.+?)(?:@(\[[^\]]+\]|[^:?\/]+):(\d+))?\/?(\?(.+?))?(?:#(.*))?\z/)
                  next unless m
                  raw_name = m[6] ? CGI.unescape(m[6]) : nil
                  # base64 形式: ss://base64#name 或带 @ 形式
                  cipher, pw, host, port = nil
                  if m[2] && m[3]
                    cipher, pw = m[1].split(":", 2)
                    host = m[2].gsub(/^\[|\]$/, "")
                    port = m[3].to_i
                  else
                    begin
                      decoded = Base64.decode64(m[1].tr("-_","+/"))
                      cipher, pw = decoded.split(":", 2)
                    rescue; next; end
                    # 没有 host:port，跳过
                    next
                  end
                  next unless cipher && pw && host && port && port > 0
                  name = (raw_name && raw_name.strip) || "SS-#{host}:#{port}"
                  px = {"name" => name, "type" => "ss", "server" => host, "port" => port, "cipher" => cipher, "password" => pw}

                else
                  next
                end

                next unless px
                next unless px["server"] && px["port"] && px["port"] > 0
                # 去重：按 server:port:type
                key = "#{px["server"]}:#{px["port"]}:#{px["type"]}"
                next if seen[key]
                seen[key] = true
                proxies << px
              rescue => e
                # 解析失败，跳过
                next
              end
            end

            puts "解析后节点数: #{proxies.length}"

            # === 3. TCP 测速 ===
            def tcp_ping(host, port, timeout = 2)
              # 解析域名
              ip = nil
              begin
                if host =~ /\A\d+\.\d+\.\d+\.\d+\z/
                  ip = host
                else
                  ip = Resolv.getaddress(host).to_s
                end
              rescue; return 9999; end
              begin
                start = Time.now
                Timeout.timeout(timeout) do
                  s = TCPSocket.new(ip, port)
                  s.close
                end
                ((Time.now - start) * 1000).round
              rescue; 9999; end
            end

            results = proxies.each_with_index.map do |p, i|
              lat = tcp_ping(p["server"], p["port"])
              print "." if i % 10 == 0
              {proxy: p, latency: lat}
            end

            # === 4. 选前 30 个存活节点 ===
            alive = results.select { |r| r[:latency] < 9999 }.sort_by { |r| r[:latency] }
            selected = alive.first(30)
            # 如果存活不足 30，补足
            if selected.length < 30
              dead = results.select { |r| r[:latency] >= 9999 }.first(30 - selected.length)
              selected += dead
            end
            puts "\n存活: #{alive.length}, 最终选取: #{selected.length}"
            exit 1 if selected.empty?

            # === 5. 节点重命名：序号+地理标签 ===
            cc_map = {
              "美国" => "US", "美國" => "US", "United States" => "US", "UnitedKingdom" => "GB",
              "英国" => "GB", "英國" => "GB", "United Kingdom" => "GB",
              "德国" => "DE", "Germany" => "DE", "法国" => "FR", "France" => "FR",
              "日本" => "JP", "Japan" => "JP", "韩国" => "KR", "Korea" => "KR", "新加坡" => "SG", "Singapore" => "SG",
              "香港" => "HK", "Hong Kong" => "HK", "台湾" => "TW", "Taiwan" => "TW",
              "加拿大" => "CA", "Canada" => "CA", "澳大利亚" => "AU", "Australia" => "AU",
              "俄罗斯" => "RU", "Russia" => "RU", "荷兰" => "NL", "Netherlands" => "NL",
              "芬兰" => "FI", "Finland" => "FI", "瑞典" => "SE", "Sweden" => "SE",
              "阿联酋" => "AE", "United Arab Emirates" => "AE", "印度" => "IN", "India" => "IN",
              "土耳其" => "TR", "Turkey" => "TR", "波兰" => "PL", "Poland" => "PL",
            }
            cc_map.default = "OT"

            used_names = {}
            renamed = selected.each_with_index.map do |r, i|
              p = r[:proxy].dup
              orig = p["name"].to_s
              cc = cc_map[orig]
              # 中英匹配都失败时再扫一遍
              if cc == "OT"
                cc_map.each { |k, v| (cc = v; break) if orig.include?(k) }
              end
              base = format("N%03d-%s", i + 1, cc)
              # 处理重名
              if used_names[base]
                used_names[base] += 1
                base = "#{base}##{used_names[base]}"
              else
                used_names[base] = 1
              end
              p["name"] = base
              {proxy: p, latency: r[:latency]}
            end

            # === 6. 生成 YAML（手动构造，确保 Mihomo 兼容）===
            def yaml_quote(v)
              v = v.to_s
              # 字符串里有特殊字符就加引号
              if v =~ /[\:#\[\]\{\}\,\&\*\!\|\>\'\"\%\@\`]/ || v =~ /\A[-?\s]/
                "\"" + v.gsub(/\\/, "\\\\\\\\").gsub(/"/, "\\\"") + "\""
              else
                v
              end
            end

            lines = ["proxies:"]
            renamed.each do |r|
              p = r[:proxy]
              lines << "  - name: \"#{p["name"]}\""
              lines << "    type: #{p["type"]}"
              lines << "    server: #{p["server"]}"
              lines << "    port: #{p["port"]}"
              case p["type"]
              when "vless"
                lines << "    uuid: #{p["uuid"]}"
                lines << "    network: #{p["network"] || "tcp"}"
                lines << "    flow: #{p["flow"]}" if p["flow"]
                lines << "    udp: true"
                lines << "    tls: #{p["tls"] ? "true" : "false"}"
                if p["servername"]
                  lines << "    servername: #{yaml_quote(p["servername"])}"
                end
                lines << "    client-fingerprint: #{p["client-fingerprint"] || "chrome"}"
                if p["reality-opts"]
                  lines << "    reality-opts:"
                  lines << "      public-key: \"#{p["reality-opts"]["public-key"]}\""
                  lines << "      short-id: \"#{p["reality-opts"]["short-id"]}\"" if p["reality-opts"]["short-id"]
                end
                if p["ws-opts"]
                  lines << "    ws-opts:"
                  lines << "      path: #{yaml_quote(p["ws-opts"]["path"] || "/")}"
                  if p["ws-opts"]["headers"]
                    lines << "      headers:"
                    p["ws-opts"]["headers"].each { |k, v| lines << "        #{k}: #{yaml_quote(v)}" }
                  end
                end
                if p["grpc-opts"]
                  lines << "    grpc-opts:"
                  lines << "      grpc-service-name: #{yaml_quote(p["grpc-opts"]["grpc-service-name"])}"
                end
              when "vmess"
                lines << "    uuid: #{p["uuid"]}"
                lines << "    alterId: #{p["alterId"] || 0}"
                lines << "    cipher: #{p["cipher"] || "auto"}"
                lines << "    network: #{p["network"] || "tcp"}"
                lines << "    udp: true"
                lines << "    tls: #{p["tls"] ? "true" : "false"}"
                lines << "    servername: #{yaml_quote(p["servername"])}" if p["servername"]
                lines << "    client-fingerprint: #{p["client-fingerprint"]}" if p["client-fingerprint"]
                if p["ws-opts"]
                  lines << "    ws-opts:"
                  lines << "      path: #{yaml_quote(p["ws-opts"]["path"] || "/")}"
                  if p["ws-opts"]["headers"]
                    lines << "      headers:"
                    p["ws-opts"]["headers"].each { |k, v| lines << "        #{k}: #{yaml_quote(v)}" }
                  end
                end
              when "trojan"
                lines << "    password: #{yaml_quote(p["password"])}"
                lines << "    udp: true"
                lines << "    sni: #{yaml_quote(p["servername"] || p["server"])}"
                lines << "    skip-cert-verify: #{p["skip-cert-verify"] ? "true" : "false"}"
              when "ss"
                lines << "    cipher: #{p["cipher"]}"
                lines << "    password: #{yaml_quote(p["password"])}"
                lines << "    udp: true"
              end
            end

            # proxy-groups: Auto（url-test 自动选最快）+ Proxy（手动选择）
            names = renamed.map { |r| r[:proxy]["name"] }
            lines << ""
            lines << "proxy-groups:"
            lines << "  - name: Auto"
            lines << "    type: url-test"
            lines << "    url: https://www.gstatic.com/generate_204"
            lines << "    interval: 120"
            lines << "    tolerance: 50"
            lines << "    proxies:"
            names.each { |n| lines << "      - \"#{n}\"" }
            lines << "  - name: Proxy"
            lines << "    type: select"
            lines << "    proxies:"
            lines << "      - Auto"
            names.each { |n| lines << "      - \"#{n}\"" }

            # 规则
            lines << ""
            lines << "rules:"
            lines << "  - MATCH,Proxy"

            File.write("/tmp/dali_config.yaml", lines.join("\n") + "\n")
            puts "✅ 生成成功，节点数: #{renamed.length}"
          '

      - name: 校验 YAML（语法检查）
        run: |
          ruby -ryaml -e "YAML.load_file('/tmp/dali_config.yaml'); puts 'YAML 语法 OK'" || (echo "YAML 语法错误！"; exit 1)
          echo "--- 前 30 行预览 ---"
          head -30 /tmp/dali_config.yaml

      - name: 提交到仓库
        run: |
          cp /tmp/dali_config.yaml assets/data/dali_config.yaml
          git config user.name "大力VPN Bot"
          git config user.email "bot@dalivpn.com"
          git add assets/data/dali_config.yaml
          git diff --cached --quiet || git commit -m "🔄 自动更新 $(date +%Y-%m-%d)（30 低延迟节点）"
          git push
