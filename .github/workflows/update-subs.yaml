name: 自动更新订阅
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions: write-all
    steps:
      - uses: actions/checkout@v6

      - name: 下载并合并
        run: |
          # 下载三个订阅
          curl -sL --max-time 30 "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/refs/heads/main/BLACK_VLESS_RUS_mobile.txt" -o /tmp/s1.txt
          curl -sL --max-time 30 "https://x.v50.lat/view.php?id=1570ebe7f5bb04ba" -o /tmp/s2.txt
          curl -sL --max-time 30 "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub" | base64 -d > /tmp/s3.txt 2>/dev/null

          # 合并
          ruby -e '
            require "yaml"
            all = []
            
            [["/tmp/s1.txt","S1-"],["/tmp/s2.txt","S2-"],["/tmp/s3.txt","S3-"]].each do |f,pre|
              begin
                parsed = YAML.safe_load(File.read(f))
                if parsed && parsed["proxies"]
                  parsed["proxies"].each do |p|
                    p["name"] = "#{pre}#{p["name"]}"
                    p["alterId"] = 0 if p["type"] == "vmess" && !p["alterId"]
                    all << p unless p["type"] == "anytls"
                  end
                end
              rescue; end
            end

            # 去重
            seen = {}; all.reject! { |p| seen["#{p["server"]}:#{p["port"]}"] ? true : (seen["#{p["server"]}:#{p["port"]}"] = true; false) }

            names = all.map { |p| p["name"] }
            yaml = "proxies:\n"
            all.each do |p|
              yaml += "  - name: \"#{p["name"]}\"\n    type: #{p["type"]}\n    server: #{p["server"]}\n    port: #{p["port"]}\n"
              yaml += "    uuid: #{p["uuid"]}\n" if p["uuid"]
              yaml += "    password: #{p["password"]}\n" if p["password"]
              yaml += "    cipher: #{p["cipher"]}\n" if p["cipher"]
              yaml += "    alterId: #{p["alterId"]}\n" if p["alterId"]
              yaml += "    network: #{p["network"]}\n" if p["network"]
              yaml += "    flow: #{p["flow"]}\n" if p["flow"]
              yaml += "    tls: #{p["tls"]}\n" if p["tls"] != nil
              yaml += "    servername: #{p["servername"]}\n" if p["servername"]
              yaml += "    client-fingerprint: #{p["client-fingerprint"]}\n" if p["client-fingerprint"]
              if p["reality-opts"]
                yaml += "    reality-opts:\n      public-key: \"#{p["reality-opts"]["public-key"]}\"\n" if p["reality-opts"]["public-key"]
                yaml += "      short-id: \"#{p["reality-opts"]["short-id"]}\"\n" if p["reality-opts"]["short-id"]
              end
              yaml += "    sni: #{p["sni"]}\n" if p["sni"]
              yaml += "    udp: #{p["udp"]}\n" if p["udp"] != nil
              yaml += "    skip-cert-verify: #{p["skip-cert-verify"]}\n" if p["skip-cert-verify"] != nil
              if p["ws-opts"]
                yaml += "    ws-opts:\n      path: \"#{p["ws-opts"]["path"]}\"\n" if p["ws-opts"]["path"]
                yaml += "      headers:\n        Host: #{p["ws-opts"]["headers"]["Host"]}\n" if p["ws-opts"] && p["ws-opts"]["headers"]
              end
              if p["grpc-opts"]
                yaml += "    grpc-opts:\n      grpc-service-name: #{p["grpc-opts"]["grpc-service-name"]}\n" if p["grpc-opts"]["grpc-service-name"]
              end
            end
            yaml += "proxy-groups:\n  - name: Proxy\n    type: url-test\n    url: https://www.gstatic.com/generate_204\n    interval: 120\n    tolerance: 50\n    proxies:\n"
            names.each { |n| yaml += "      - \"#{n}\"\n" }
            yaml += "rules:\n  - MATCH,Proxy\n"
            File.write("/tmp/dali_config.yaml", yaml)
            puts "完成: #{all.length} 节点"
          '

      - name: 提交
        run: |
          cp /tmp/dali_config.yaml assets/data/dali_config.yaml
          git config user.name "大力VPN Bot"
          git config user.email "bot@dalivpn.com"
          git add assets/data/dali_config.yaml
          git diff --cached --quiet || git commit -m "🔄 自动更新订阅 $(date +%Y-%m-%d)"
          git push
