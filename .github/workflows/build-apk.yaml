name: 构建大力VPN
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: arm
          - arch: amd64
          - arch: universal

    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 1}

      - name: Clone Bettbox
        run: git clone --depth 1 https://github.com/appshubcc/Bettbox.git bettbox-src

      - name: 改显示名 → 大力VPN
        run: |
          cd bettbox-src
          sed -i 's|android:label="Bettbox"|android:label="大力VPN"|g' android/app/src/main/AndroidManifest.xml

      - name: 嵌入双订阅地址 + 自动加载
        run: |
          cd bettbox-src
          cat > lib/common/auto_sub.dart << 'DART'
          import 'package:bett_box/common/common.dart';
          import 'package:bett_box/models/models.dart';
          import 'package:bett_box/state.dart';

          Future<void> loadSub() async {
            if (globalState.config.profiles.isNotEmpty) return;
            const subs = [
              {'url': 'https://x.v50.lat/view.php?id=1570ebe7f5bb04ba', 'label': '订阅1'},
              {'url': 'https://raw.githubusercontent.com/dalichuqijiai/DaLiVpn/main/assets/data/sub2.yaml', 'label': '订阅2'},
            ];
            for (final s in subs) {
              try {
                commonPrint.log('大力VPN: 加载 ${s["label"]}...');
                final p = Profile.normal(url: s['url']!, label: s['label']!);
                await globalState.appController.addProfile(p);
                await globalState.appController.updateProfile(p);
              } catch (e) {
                commonPrint.log('加载失败: $e');
              }
            }
          }
          DART
          if grep -q 'autoUpdateProfiles' lib/controller.dart; then
            sed -i 's/autoUpdateProfiles();/await loadSub();\n    autoUpdateProfiles();/' lib/controller.dart
            if ! grep -q "auto_sub.dart" lib/controller.dart; then
              (echo 'import "package:bett_box/common/auto_sub.dart";'; cat lib/controller.dart) > /tmp/t.dart && mv /tmp/t.dart lib/controller.dart
            fi
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: bettbox-src/core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version: '3.44.0'

      - name: Build APK
        run: |
          cd bettbox-src/android
          rm -rf .gradle build app/keystore.jks local.properties
          keytool -genkey -v -keystore app/keystore.jks -alias dali_vpn \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass Dalivpn123! -keypass Dalivpn123! \
            -dname "CN=VPN, OU=Dev, O=VPN, L=Unknown, ST=Unknown, C=CN"
          printf 'keyAlias=dali_vpn\nstorePassword=Dalivpn123!\nkeyPassword=Dalivpn123!\nstoreFile=app/keystore.jks\n' >> local.properties
          cd ..
          flutter pub get
          find . -name "*.freezed.dart" -o -name "*.g.dart" | grep -v ".dart_tool" | while read f; do rm -f "$f"; done
          dart run build_runner build --delete-conflicting-outputs -d
          dart setup.dart android --arch ${{ matrix.arch }}

      - name: Collect APK
        run: |
          mkdir -p dist
          [ -d bettbox-src/dist ] && for f in bettbox-src/dist/*.apk; do
            cp "$f" "dist/$(basename "$f" | sed 's/Bettbox/大力VPN/')"
          done
          find bettbox-src/android -path "*/outputs/apk/*" -name "*.apk" -exec cp {} ./dist/ \; 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: 大力VPN-android-${{ matrix.arch }}
          path: ./dist/
          overwrite: true

  release:
    permissions: write-all
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: ./apks/
          pattern: 大力VPN-*
          merge-multiple: true
      - name: Generate tag
        id: tag
        run: |
          [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.ref_name }}" ] && echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT || echo "TAG=大力VPN-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: 大力VPN ${{ steps.tag.outputs.TAG }}
          files: ./apks/**/*.apk
          body: "## 大力VPN\n内嵌 2 个订阅源，首次启动自动加载"
          fail_on_unmatched_files: false
