# 大力VPN - GitHub Actions 自动构建
name: 构建大力VPN

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SENTRY_BACKEND: none
  PUB_HOSTED_URL: https://pub.flutter-io.cn
  FLUTTER_STORAGE_BASE_URL: https://storage.flutter-io.cn

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: arm
          - arch: amd64
          - arch: universal

    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 1}

      - name: 克隆 Bettbox 源码
        run: git clone --depth 1 https://github.com/appshubcc/Bettbox.git bettbox-src

      - name: ① 应用本地 bug 修复 patch
        run: |
          # 用仓库里 bettbox-patches/ 的已修复文件覆盖上游 buggy 版本
          # 这些文件修复了上游 getter 被当函数调用等编译错误
          # 注意：用显式映射表，不能用 sed 全局 _ → /（auto_sub 里的下划线会被错转）
          declare -A PATCH_MAP=(
            ["lib_common_auto_sub.dart"]="lib/common/auto_sub.dart"
            ["lib_common_datetime.dart"]="lib/common/datetime.dart"
            ["lib_controller.dart"]="lib/controller.dart"
            ["lib_views_connection_connections.dart"]="lib/views/connection/connections.dart"
            ["lib_views_connection_item.dart"]="lib/views/connection/item.dart"
            ["lib_views_connection_requests.dart"]="lib/views/connection/requests.dart"
            ["lib_views_logs.dart"]="lib/views/logs.dart"
            ["lib_views_profiles_profiles.dart"]="lib/views/profiles/profiles.dart"
            ["lib_views_proxies_providers.dart"]="lib/views/proxies/providers.dart"
          )
          for src in "${!PATCH_MAP[@]}"; do
            target="bettbox-src/${PATCH_MAP[$src]}"
            if [ -f "bettbox-patches/$src" ]; then
              mkdir -p "$(dirname "$target")"
              cp "bettbox-patches/$src" "$target"
              echo "  ✓ $src → $target"
            else
              echo "  ✗ 缺少 patch: $src"
              exit 1
            fi
          done

      - name: ② 改名 → 大力VPN（仅改 label，不改包名避免 .so 不匹配）
        run: |
          cd bettbox-src
          sed -i 's|android:label="Bettbox"|android:label="大力VPN"|g' android/app/src/main/AndroidManifest.xml
          # 验证
          grep 'android:label' android/app/src/main/AndroidManifest.xml

      - name: ③ 把订阅 URL 改为 jsdelivr CDN（国内可访问）
        run: |
          cd bettbox-src
          # auto_sub.dart 里写死的是 raw.githubusercontent URL，国内可能被墙，改成 jsdelivr CDN
          python3 -c "
          import re
          p = 'lib/common/auto_sub.dart'
          s = open(p).read()
          s = re.sub(r'https?://[^\s\\'\"]+dali_config\.yaml',
                      'https://cdn.jsdelivr.net/gh/dalichuqijiai/DaLiVpn@main/assets/data/dali_config.yaml', s)
          open(p,'w').write(s)
          "
          echo '--- auto_sub.dart URL 验证 ---'
          grep -n "dali_config" lib/common/auto_sub.dart || (echo 'URL 未注入！'; exit 1)

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: bettbox-src/core/go.sum

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version: '3.44.0'

      - name: 生成签名密钥
        run: |
          cd bettbox-src/android
          rm -rf .gradle build app/keystore.jks local.properties
          keytool -genkey -v -keystore app/keystore.jks -alias dali_vpn \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass Dalivpn123! -keypass Dalivpn123! \
            -dname "CN=大力VPN, OU=Dev, O=大力VPN, L=Unknown, ST=Unknown, C=CN"
          cat >> local.properties << PROPS
          keyAlias=dali_vpn
          storePassword=Dalivpn123!
          keyPassword=Dalivpn123!
          storeFile=app/keystore.jks
          PROPS

      - name: 编译 APK (${{ matrix.arch }})
        run: |
          cd bettbox-src
          flutter pub get
          # 重新生成 freezed/g.dart（patch 里的 state.g.dart 可能版本不匹配）
          dart run build_runner build --delete-conflicting-outputs -d || true
          dart setup.dart android --arch ${{ matrix.arch }}

      - name: 收集 APK
        run: |
          mkdir -p dist
          [ -d bettbox-src/dist ] && cp bettbox-src/dist/* ./dist/ 2>/dev/null || true
          find bettbox-src/android -path "*/outputs/apk/*" -name "*.apk" -exec cp {} ./dist/ \; 2>/dev/null || true

      - name: 上传 APK
        uses: actions/upload-artifact@v6
        with:
          name: 大力VPN-android-${{ matrix.arch }}
          path: ./dist/
          compression-level: 9
          overwrite: true

  release:
    permissions: write-all
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: ./apks/
          pattern: 大力VPN-*
          merge-multiple: true

      - name: 自动生成标签
        id: tag
        run: |
          if [ -n "${{ github.ref_name }}" ]; then
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=大力VPN-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi

      - uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: 大力VPN ${{ steps.tag.outputs.TAG }}
          files: ./apks/**/*.apk
          body: |
            ## 🚀 大力VPN

            基于 Bettbox (Mihomo/Clash Meta 内核) 的 Android VPN 客户端。

            ### ✨ 特性
            - **60 个精选节点**：从 3 个订阅源合并，云端 TLS 握手 + WebSocket 深度测速后选取延迟最低的 60 个
            - **自动选择**：内置 `Auto` (url-test) 组，App 启动后自动切到最快节点
            - **三订阅源**：俄罗斯 / Fastly / Pawdroid，每 6 小时自动刷新
            - **协议支持**：VLESS (Reality/WS/gRPC) / Trojan / VMess
            - 首次启动自动加载订阅，无需手动配置

            ### 📥 下载
            | 架构 | 适用设备 |
            |---|---|
            | **arm64-v8a** | 大多数现代手机（推荐） |
            | **armeabi-v7a** | 32 位老设备 |
            | **x86_64** | 平板 / 模拟器 |
            | **universal** | 全架构（体积最大） |

            ### ⚠️ 安装注意
            - 安装前请**关闭 Google Play Protect**（防止误报卸载）
            - 首次启动需联网拉取订阅（约 2-5 秒）
          fail_on_unmatched_files: false
