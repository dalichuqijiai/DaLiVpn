name: 构建大力VPN
on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  GRADLE_OPTS: -Dorg.gradle.vfs.watch=false
  SENTRY_BACKEND: none

jobs:
  build-android:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
          - arch: arm
          - arch: amd64
          - arch: universal

    steps:
      - uses: actions/checkout@v6
        with: {fetch-depth: 1}

      - name: Clone Bettbox
        run: git clone --depth 1 https://github.com/appshubcc/Bettbox.git bettbox-src

      - name: Branding - 大力VPN
        run: |
          cd bettbox-src
          # 只改显示名，不改包名（核心库 .so 改不了）
          sed -i 's/^name: bett_box/name: dali_vpn/' pubspec.yaml
          sed -i 's|android:label="Bettbox"|android:label="大力VPN"|g' android/app/src/main/AndroidManifest.xml

      - name: Embed subscription URL
        run: |
          cd bettbox-src
          URL="https://raw.githubusercontent.com/dalichuqijiai/DaLiVpn/main/assets/data/dali_config.yaml"
          cat >> lib/common/constant.dart << EOF
          const daliVpnDefaultSubscriptionUrl = '$URL';
          EOF

      - name: Auto-load on first launch
        run: |
          cd bettbox-src
          mkdir -p lib/common
          cat > lib/common/auto_subscription.dart << DART
          import 'package:bett_box/common/constant.dart';
          import 'package:bett_box/common/common.dart';
          import 'package:bett_box/models/models.dart';
          import 'package:bett_box/models/profile.dart';
          import 'package:bett_box/state.dart';
          Future<void> autoLoadDefaultSubscription() async {
            if (globalState.config.profiles.isNotEmpty) return;
            final url = daliVpnDefaultSubscriptionUrl;
            if (url.isEmpty) return;
            commonPrint.log('大力VPN: 首次启动，自动加载节点...');
            final profile = Profile.normal(url: url, label: '大力VPN订阅');
            await globalState.appController.addProfile(profile);
            await globalState.appController.updateProfile(profile);
          }
          DART
          if grep -q 'autoUpdateProfiles' lib/controller.dart; then
            sed -i 's/autoUpdateProfiles();/await autoLoadDefaultSubscription();\n    autoUpdateProfiles();/' lib/controller.dart
            if ! grep -q "auto_subscription.dart" lib/controller.dart; then
              (echo 'import "package:bett_box/common/auto_subscription.dart";'; cat lib/controller.dart) > /tmp/t && mv /tmp/t lib/controller.dart
            fi
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: 'gradle'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'
          cache-dependency-path: bettbox-src/core/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
          flutter-version: '3.44.0'

      - name: Build APK
        run: |
          cd bettbox-src/android
          rm -rf .gradle build app/keystore.jks local.properties
          keytool -genkey -v -keystore app/keystore.jks -alias dali_vpn \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass Dalivpn123! -keypass Dalivpn123! \
            -dname "CN=VPN, OU=Dev, O=VPN, L=Unknown, ST=Unknown, C=CN"
          cat >> local.properties << PROPS
          keyAlias=dali_vpn
          storePassword=Dalivpn123!
          keyPassword=Dalivpn123!
          storeFile=app/keystore.jks
          PROPS
          cd ..
          flutter pub get
          find . -name "*.freezed.dart" -o -name "*.g.dart" | grep -v ".dart_tool" | while read f; do rm -f "$f"; done
          dart run build_runner build --delete-conflicting-outputs -d
          dart setup.dart android --arch ${{ matrix.arch }}

      - name: Rename APK
        run: |
          mkdir -p dist
          [ -d bettbox-src/dist ] && for f in bettbox-src/dist/*.apk; do
            cp "$f" "dist/$(basename "$f" | sed 's/Bettbox/大力VPN/')"
          done
          find bettbox-src/android -path "*/outputs/apk/*" -name "*.apk" -exec cp {} ./dist/ \; 2>/dev/null || true

      - uses: actions/upload-artifact@v6
        with:
          name: 大力VPN-android-${{ matrix.arch }}
          path: ./dist/
          overwrite: true

  release:
    permissions: write-all
    needs: [build-android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          path: ./apks/
          pattern: 大力VPN-*
          merge-multiple: true
      - name: Generate tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ -n "${{ github.ref_name }}" ]; then
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=大力VPN-$(date +%Y%m%d-%H%M)" >> $GITHUB_OUTPUT
          fi
      - uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: 大力VPN ${{ steps.tag.outputs.TAG }}
          files: ./apks/**/*.apk
          body: |
            ## 🚀 大力VPN
            - 内嵌 62 节点 Clash YAML
            - 首次启动自动加载
            - 支持 VLESS Reality / WS / XHTTP / gRPC
          fail_on_unmatched_files: false
